name: jp_eln_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10.13
  - pandas>=2.0.0
  - numpy>=1.24.0
  - scipy>=1.10.0
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - jupyterlab>=4.1.0
  - jupyter-book>=2.0.0
  - ipywidgets>=8.0.0
  - ipykernel
  - pip
  - pip:
    - jupyterlab-rise  # Installing via pip avoids the conda channel naming conflict
    - gh-scoped-creds
    - bleach>=6.1.0
    - tinycss2>=1.2.1
    - cookiecutter